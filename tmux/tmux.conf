# =============================================================================
# Tmux Configuration
# =============================================================================

# Prefix: C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# =============================================================================
# Terminal & Colors (Alacritty)
# =============================================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",alacritty:Smulx=\E[4::%p1%dm"
set -ag terminal-overrides ",alacritty:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# =============================================================================
# General Settings
# =============================================================================

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
setw -g mode-keys vi

# =============================================================================
# Keybindings
# =============================================================================

# Splits (preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vi-style copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Dev layout: top-left nvim, top-right claude code, bottom-full terminal
bind D split-window -h -c "#{pane_current_path}" \; \
  split-window -v -f -c "#{pane_current_path}" \; \
  select-pane -t 1 \; \
  send-keys "nvim" Enter \; \
  select-pane -t 2 \; \
  send-keys "claude" Enter \; \
  select-pane -t 3

# =============================================================================
# Status Bar — Tokyo Night Moon
# =============================================================================

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e2030,fg=#c8d3f5"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#1e2030,bg=#82aaff,bold] #S #[fg=#82aaff,bg=#1e2030] "

# Right: date and time
set -g status-right-length 40
set -g status-right "#[fg=#545c7e] %a %b %d #[fg=#82aaff]%H:%M "

# Window tabs
setw -g window-status-format "#[fg=#545c7e] #I:#W "
setw -g window-status-current-format "#[fg=#1e2030,bg=#82aaff,bold] #I:#W #[fg=#82aaff,bg=#1e2030]"
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#82aaff"

# Message style
set -g message-style "bg=#1e2030,fg=#c3e88d"

# =============================================================================
# Plugins (TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Bootstrap TPM (install with: git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm)
run '~/.config/tmux/plugins/tpm/tpm'
