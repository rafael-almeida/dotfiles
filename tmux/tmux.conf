# =============================================================================
# Tmux Configuration
# =============================================================================

# TODO 03/20/2026 - I am still deciding whether to use C-Space or C-a as my tmux prefix.
# Prefix: C-Space
# unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================================================
# Terminal & Colors (Ghostty)
# =============================================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-overrides ",xterm-ghostty:Smulx=\E[4::%p1%dm"
set -ag terminal-overrides ",xterm-ghostty:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# =============================================================================
# General Settings
# =============================================================================

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# TODO 03/20/2026 - provided by tmux-sensible. I'll keep it here until I decide if I want to keep tmux-sensible or not.
# set -g history-limit 50000
# set -sg escape-time 0
# set -g focus-events on

# =============================================================================
# Keybindings
# =============================================================================

# Splits (preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vi-style copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Window navigation (no wrap-around)
bind -n S-Left if-shell '[ "#{window_index}" -gt 1 ]' 'previous-window'
bind -n S-Right if-shell '[ "#{window_index}" -lt "#{session_windows}" ]' 'next-window'
# bind -n C-n if-shell '[ "#{window_index}" -lt "#{session_windows}" ]' 'next-window'
# bind -n C-p if-shell '[ "#{window_index}" -gt 1 ]' 'previous-window'

# Kill pane without confirmation
bind x kill-pane

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Dev layout: top-left nvim, top-right claude code, bottom-full terminal
bind D split-window -h -p 40 -c "#{pane_current_path}" \; \
  split-window -v -f -l 10 -c "#{pane_current_path}" \; \
  select-pane -t 1 \; \
  send-keys "nvim ." Enter \; \
  select-pane -t 2 \; \
  send-keys "claude" Enter \; \
  select-pane -t 1

# =============================================================================
# Status Bar
# =============================================================================

# set -g status-position bottom

# =============================================================================
# Plugins (TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Bootstrap TPM (install with: git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm)
run '~/.config/tmux/plugins/tpm/tpm'
