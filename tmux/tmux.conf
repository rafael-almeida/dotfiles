# =============================================================================
# Tmux Configuration
# =============================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================================================
# Terminal & Colors
# =============================================================================

# set -g default-terminal "screen-256color"

# Fix Undercurls
# https://github.com/folke/tokyonight.nvim?tab=readme-ov-file#-overriding-colors--highlight-groups
set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colors (needs tmux-3.0)

# =============================================================================
# General Settings
# =============================================================================

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# =============================================================================
# Keybindings
# =============================================================================

# Splits (preserves cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vi-style copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Window navigation (no wrap-around)
bind -n S-Left if-shell '[ "#{window_index}" -gt 1 ]' 'previous-window'
bind -n S-Right if-shell '[ "#{window_index}" -lt "#{session_windows}" ]' 'next-window'
# bind -n C-n if-shell '[ "#{window_index}" -lt "#{session_windows}" ]' 'next-window'
# bind -n C-p if-shell '[ "#{window_index}" -gt 1 ]' 'previous-window'

# Kill pane without confirmation
bind x kill-pane

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Dev layout: top-left nvim, top-right claude code, bottom-full terminal
bind D split-window -h -p 40 -c "#{pane_current_path}" \; \
  split-window -v -f -l 10 -c "#{pane_current_path}" \; \
  select-pane -t 1 \; \
  send-keys "nvim ." Enter \; \
  select-pane -t 2 \; \
  send-keys "claude" Enter \; \
  select-pane -t 1

# =============================================================================
# Plugins (TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Bootstrap TPM
run '~/.config/tmux/plugins/tpm/tpm'
